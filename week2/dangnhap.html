<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Auth UI</title>
<link rel="stylesheet" href="dangnhap.css">
</head>
<body>
<div class="box">


  <div id="loginForm">
    <h2>Đăng nhập</h2>


    <input id="loginEmail" placeholder="Email">


    <div class="password-box">
      <input id="loginPass" type="password" placeholder="Mật khẩu">
      <span class="toggle" onclick="togglePassword('loginPass')">👁️</span>
    </div>


    <div class="options">
      <label>
        <input type="checkbox" id="remember"> Ghi nhớ
      </label>
      <span class="forgot" onclick="forgot()">Quên?</span>
    </div>


    <button onclick="login()">Đăng nhập</button>


    <p class="link" onclick="showRegister()">Chưa có tài khoản?</p>
  </div>


  <div id="registerForm" class="hidden">
    <h2>Đăng ký</h2>


    <input id="regEmail" placeholder="Email">

    <div class="password-box">
      <input id="regPass" type="password" placeholder="Mật khẩu">
      <span class="toggle" onclick="togglePassword('regPass')">👁️</span>
    </div>


    <button onclick="register()">Đăng ký</button>


    <p class="link" onclick="showLogin()">Đã có tài khoản?</p>
  </div>


  <div id="dashboard" class="hidden">
    <h2>Xin chào 👋</h2>
    <p id="user"></p>
    <button onclick="logout()">Đăng xuất</button>
  </div>


</div>


<script src="dangnhap.js"></script>
</body>
</html>
